<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
      :root {
        --bg: #f3efe5;
        --paper: rgba(255, 251, 242, 0.9);
        --ink: #1b1a17;
        --muted: #6c6557;
        --line: rgba(27, 26, 23, 0.12);
        --brand: #c24b2d;
        --brand-dark: #7f2714;
        --good: #1f6f43;
        --bad: #9d2d2d;
        --shadow: 0 20px 60px rgba(68, 43, 24, 0.15);
      }

      * { box-sizing: border-box; }

      html, body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(194, 75, 45, 0.18), transparent 30%),
          radial-gradient(circle at bottom right, rgba(31, 111, 67, 0.16), transparent 28%),
          linear-gradient(135deg, #f7f0de, #efe6d2 55%, #e9dfca);
        display: flex;
        flex-direction: column;
      }

      h1, h2, h3, p, td, th, a, span, div {
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      a { color: var(--brand-dark); }

      .shell {
        max-width: 1280px;
        width: 100%;
        margin: 0 auto;
        padding: 28px 24px 16px;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }

      /* ── Hero ── */
      .hero {
        display: flex;
        justify-content: space-between;
        gap: 24px;
        align-items: flex-start;
        margin-bottom: 20px;
        flex-shrink: 0;
      }
      .hero h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 0.98;
        letter-spacing: -0.04em;
      }
      .hero p {
        margin: 10px 0 0;
        max-width: 760px;
        color: var(--muted);
        font-size: 1.05rem;
      }

      /* ── Paper / Card ── */
      .paper {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }
      .card { padding: 20px; }

      /* ── Grid ── */
      .grid { display: grid; gap: 14px; }
      .grid.two {
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        align-items: stretch;
        flex: 1;
        min-height: 0;
      }
      .grid.three { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }

      /* ── Metrics ── */
      .metric {
        padding: 16px 20px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.62);
        border: 1px solid rgba(27, 26, 23, 0.08);
      }
      .metric span {
        display: block;
        font-size: 0.9rem;
        color: var(--muted);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .metric strong { font-size: 1.8rem; line-height: 1; }

      /* ── Forms ── */
      form { display: grid; gap: 14px; }
      label { font-size: 0.95rem; color: var(--muted); display: grid; gap: 6px; }
      input, textarea, select {
        width: 100%;
        border: 1px solid rgba(27, 26, 23, 0.16);
        border-radius: 14px;
        padding: 14px 16px;
        background: rgba(255,255,255,0.88);
        color: var(--ink);
        font: inherit;
      }
      textarea { resize: vertical; min-height: 120px; }
      button {
        border: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--brand), #d9823b);
        color: #fff;
        padding: 14px 18px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      button.secondary { background: linear-gradient(135deg, #384d42, #58725d); }

      /* ── Notices ── */
      .notice { padding: 14px 16px; border-radius: 16px; margin-bottom: 16px; font-size: 0.96rem; }
      .notice.info  { background: rgba(31, 111, 67, 0.1);  color: var(--good); border: 1px solid rgba(31, 111, 67, 0.18); }
      .notice.error { background: rgba(157, 45, 45, 0.12); color: var(--bad);  border: 1px solid rgba(157, 45, 45, 0.18); }

      /* ── Table ── */
      .table-wrap { width: 100%; overflow-x: auto; }
      .table { width: 100%; border-collapse: collapse; table-layout: fixed; }
      .table th, .table td {
        padding: 12px 10px;
        border-bottom: 1px solid rgba(27,26,23,0.08);
        text-align: left;
        vertical-align: top;
      }
      .table th { font-size: 0.84rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
      .table th:nth-child(1), .table td:nth-child(1) { width: 28%; }
      .table th:nth-child(2), .table td:nth-child(2) { width: 42%; }
      .table th:nth-child(3), .table td:nth-child(3) { width: 30%; }

      /* ── Misc ── */
      .mono  { font-family: "SFMono-Regular", Consolas, monospace; font-size: 0.92rem; }
      .stack { display: grid; gap: 12px; }
      .split { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
      .small { font-size: 0.92rem; color: var(--muted); }
      .badge       { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 0.82rem; font-weight: 700; }
      .badge.cache { background: rgba(194, 75, 45, 0.12); color: var(--brand); }
      .badge.db    { background: rgba(31, 111, 67, 0.12);  color: var(--good); }
      .result-box  { padding: 18px; border-radius: 16px; background: rgba(31, 111, 67, 0.08); border: 1px solid rgba(31, 111, 67, 0.16); word-break: break-all; }
      nav   { display: flex; gap: 18px; align-items: center; }
      nav a { text-decoration: none; font-weight: 700; }

      /* ── Scroll panels ── */
      .scroll-panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }

      .scroll-body {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        min-height: 0;
        padding-right: 4px;
        scrollbar-gutter: stable;
      }

      .scroll-body::-webkit-scrollbar       { width: 8px; }
      .scroll-body::-webkit-scrollbar-thumb { background: rgba(27, 26, 23, 0.18); border-radius: 999px; }
      .scroll-body::-webkit-scrollbar-track { background: transparent; }

      /* ── Preview grid / cards ── */
      .preview-grid {
        --cols: 2;
        display: grid;
        grid-template-columns: repeat(var(--cols), 1fr);
        gap: 14px;
      }

      .preview-card {
        display: grid;
        gap: 10px;
        padding: 12px;
        border-radius: 18px;
        background: rgba(255,255,255,0.72);
        border: 1px solid rgba(27,26,23,0.08);
        min-width: 0;
      }

      .preview-thumb {
        display: block;
        width: 100%;
        aspect-ratio: 1;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.9);
      }
      .preview-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .preview-meta           { display: grid; gap: 5px; min-width: 0; }
      .preview-meta .title    { font-weight: 700; line-height: 1.25; font-size: 0.93rem; }
      .preview-meta .line     { font-size: 0.85rem; color: var(--muted); }

      .hash-link {
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 0.8rem;
        text-decoration: none;
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .meta-clamp {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* ── Columns control ── */
      .cols-control {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.88rem;
        color: var(--muted);
        flex-shrink: 0;
      }
      .cols-control input[type=range] {
        width: 90px;
        padding: 0;
        border: none;
        background: none;
        accent-color: var(--brand);
        cursor: pointer;
      }
      .cols-control .cols-val {
        min-width: 18px;
        font-weight: 700;
        color: var(--ink);
        text-align: center;
      }

      /* ── Pager ── */
      .pager {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        padding-top: 12px;
        border-top: 1px solid var(--line);
        flex-shrink: 0;
      }
      .pager-links { display: flex; gap: 10px; flex-wrap: wrap; }
      .pager-link {
        text-decoration: none;
        padding: 7px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.7);
        color: var(--ink);
        font-weight: 700;
        font-size: 0.9rem;
      }
      .pager-link.active {
        background: linear-gradient(135deg, var(--brand), #d9823b);
        color: #fff;
        border-color: transparent;
      }

      /* ── Responsive ── */
      @media (max-width: 720px) {
        .shell { padding: 16px 14px 10px; }
        .hero  { flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <div class="shell">{{ body|safe }}</div>
  </body>
</html>
